<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High-Fidelity Audio Visualizer</title>
  <style>
    :root {
      --bg-color: #0a0a0f;
      --panel-color: #12121a;
      --accent-color: #00f2fe;
      --accent-glow: #4facfe;
      --text-color: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 600px;
      height: 450px;
      overflow: hidden;
      box-sizing: border-box;
    }

    .dashboard {
      width: 100%;
      height: 100%;
      background: var(--panel-color);
      padding: 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-color), var(--accent-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .visualizer-container {
      position: relative;
      width: 100%;
      flex-grow: 1;
      background: #020205;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 12px;
    }

    .capture-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-color), var(--accent-glow));
      color: #0a0a0f;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .capture-btn:hover {
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
      transform: translateY(-1px);
    }

    .capture-btn:disabled {
      background: #232526;
      color: #718096;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-badge {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
    }

    .status-active {
      background: rgba(0, 242, 254, 0.1);
      color: var(--accent-color);
      border: 1px solid rgba(0, 242, 254, 0.2);
    }
  </style>
  <script type="module" crossorigin src="/assets/main.js"></script>
</head>

<body>
  <div class="dashboard">
    <header>
      <h1>SONICWAVE // WASM VISUALIZER</h1>
      <div id="engine-status" class="status-badge">Engine: Initializing...</div>
    </header>

    <div class="visualizer-container">
      <canvas id="visualizer"></canvas>
    </div>

    <div class="controls">
      <button id="start-capture" class="capture-btn">START CAPTURING TAB</button>
    </div>
  </div>
</body>

</html>
