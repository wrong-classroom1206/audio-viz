<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High-Fidelity Audio Visualizer</title>
  <style>
    :root {
      --bg-color: #0a0a0f;
      --panel-color: #12121a;
      --accent-color: #00f2fe;
      --accent-glow: #4facfe;
      --text-color: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .dashboard {
      width: 90vw;
      max-width: 1200px;
      background: var(--panel-color);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-color), var(--accent-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .visualizer-container {
      position: relative;
      width: 100%;
      height: 450px;
      background: #020205;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.2);
      padding: 16px;
      border-radius: 12px;
      gap: 20px;
    }

    .file-upload-btn {
      background: linear-gradient(135deg, #232526, #414345);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .file-upload-btn:hover {
      border-color: var(--accent-color);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }

    input[type="file"] {
      display: none;
    }

    audio {
      flex-grow: 1;
      max-width: 600px;
      accent-color: var(--accent-color);
    }

    .status-badge {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
    }

    .status-active {
      background: rgba(0, 242, 254, 0.1);
      color: var(--accent-color);
      border: 1px solid rgba(0, 242, 254, 0.2);
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <header>
      <h1>SONICWAVE // WASM VISUALIZER</h1>
      <div id="engine-status" class="status-badge">Engine: Initializing...</div>
    </header>

    <div class="visualizer-container">
      <canvas id="visualizer"></canvas>
    </div>

    <div class="controls">
      <label class="file-upload-btn">
        CHOOSE AUDIO FILE
        <input type="file" id="audio-file" accept="audio/*">
      </label>
      <audio id="audio-player" controls></audio>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
